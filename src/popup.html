<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Odoo Barcode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="toolbar">
        <h1>Barcode</h1>
        <button type="button" id="open-settings" class="icon-btn" title="Settings" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"
            />
          </svg>
        </button>
      </header>
      <p class="hint">
        Open your Odoo Barcode tab, enter a code, then click Send. History is kept for this browser session only and is cleared when you
        quit the browser.
      </p>
      <label class="field">
        <span>Code</span>
        <input id="code" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. 1234567890123" />
      </label>
      <div class="row">
        <button id="send" type="button" class="primary">Send (scan)</button>
        <label class="inline"><input id="noEnter" type="checkbox" /> Do not send Enter</label>
      </div>
      <p id="status" class="status" role="status"></p>
      <section class="history">
        <h2>Session history</h2>
        <ul id="list"></ul>
        <button id="clear" type="button" class="ghost">Clear session history</button>
      </section>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
